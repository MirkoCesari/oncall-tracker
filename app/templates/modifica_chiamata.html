{% extends "base.html" %}
{% block title %}{{ t('edit_call') }} — OnCall Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil-fill me-2 text-warning"></i>{{ t('edit_call') }} #{{ chiamata.id }}</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small text-muted">{{ t('datetime') }}</label>
                        <input type="datetime-local" name="data_ora" class="form-control" value="{{ chiamata.data_ora.strftime('%Y-%m-%dT%H:%M') }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">{{ t('duration_min') }}</label>
                        <input type="number" name="durata_minuti" class="form-control" min="1" value="{{ chiamata.durata_minuti }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">{{ t('workorder') }}</label>
                        <input type="text" name="commessa" class="form-control" value="{{ chiamata.commessa or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">{{ t('description') }}</label>
                        <textarea name="descrizione" class="form-control" rows="3">{{ chiamata.descrizione or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-check-circle me-2"></i>{{ t('save') }}</button>
                        <a href="/" class="btn btn-outline-secondary flex-fill"><i class="bi bi-x-circle me-2"></i>{{ t('cancel') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
